name: "Dizipal"
description: "Dizipal İçeriklerini İzleyin."
version: "1.3.1"
slug: "fusion_dizipal"
url: "https://github.com/dzirambola/hassio-addons"

# Görünüm Ayarları
panel_icon: "mdi:play-box-outline"
panel_title: "Dizipal"
# Home Assistant panelinde logonun görünmesi için:
icon: "https://raw.githubusercontent.com/dzirambola/hassio-addons/main/fusion_dizipal/image_0.png"

build_from:
  aarch64: "debian:bullseye-slim"
  armv7: "debian:bullseye-slim"
  amd64: "debian:bullseye-slim"

ports:
  7860/tcp: 7860

ports_description:
  7860/tcp: "Dizipal API & Manifest"

init: false
startup: "application"
boot: "auto"

map:
  - data:rw

options:
  base_url: "https://dizipal.im"
  addon_url: "http://192.168.2.145:7860"
  port: 7860
  cache_ttl_hours: 12
  headless: true
  timeout_ms: 45000

schema:
  base_url: str
  addon_url: str
  port: int(1024,65535)
  cache_ttl_hours: int(1,72)
  headless: bool
  timeout_ms: int(5000,60000)

privileged:
  - SYS_ADMIN

arch:
  - aarch64
  - armv7
  - amd64
