name: "Dizipal"
description: "Dizipal İçeriklerini İzleyin (v1.4.0)"
version: "1.4.0"
slug: "fusion_dizipal"
url: "https://github.com/KULLANICI_ADIN/hassio-addons"

panel_icon: "mdi:play-box-outline"
panel_title: "Dizipal"

build_from:
  aarch64: "debian:bookworm-slim"
  armv7: "debian:bookworm-slim"
  amd64: "debian:bookworm-slim"

# Privileged kaldırıldı - Güvenli mod
privileged: []

ports:
  7860/tcp: 7860

options:
  base_url: "https://dizipal.im"
  port: 7860
  cache_ttl_hours: 12
  headless: true
  timeout_ms: 45000
  omdb_api_key: "trilogy"

schema:
  base_url: str
  port: int(1024,65535)
  cache_ttl_hours: int(1,72)
  headless: bool
  timeout_ms: int(5000,60000)
  omdb_api_key: str

arch:
  - aarch64
  - armv7
  - amd64
