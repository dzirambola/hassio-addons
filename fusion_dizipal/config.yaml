name: "Dizipal"
description: "Dizipal İçeriklerini İzleyin."
version: "1.4.5"
slug: "fusion_dizipal"
url: "https://github.com/dzirambola/hassio-addons"

panel_icon: "mdi:play-box-outline"
panel_title: "Dizipal"
icon: "https://raw.githubusercontent.com/dzirambola/hassio-addons/main/fusion_dizipal/image_0.png"

build_from:
  aarch64: "debian:bookworm-slim"
  armv7: "debian:bookworm-slim"
  amd64: "debian:bookworm-slim"

ports:
  7860/tcp: 7860

privileged:
  - SYS_ADMIN

options:
  base_url: "https://dizipal.im"
  port: 7860
  cache_ttl_hours: 12
  headless: true
  timeout_ms: 45000
  omdb_api_key: "trilogy"

schema:
  base_url: str
  port: int(1024,65535)
  cache_ttl_hours: int(1,72)
  headless: bool
  timeout_ms: int(5000,60000)
  omdb_api_key: str

arch:
  - aarch64
  - armv7
  - amd64
