# ─────────────────────────────────────────────────────────────────────────────
# Home Assistant Add-on Configuration
# https://developers.home-assistant.io/docs/add-ons/configuration
# ─────────────────────────────────────────────────────────────────────────────
name: "Fusion Dizipal Addon"
description: >
  Fusion Media Center eklentisi – dizipal.im sitesinden Puppeteer ile
  M3U8 video linklerini yakalar ve Fusion protokolü ile sunar.
version: "1.0.2"
slug: "fusion_dizipal"
url: "https://github.com/yourusername/fusion-dizipal-addon"

# ── Runtime ───────────────────────────────────────────────────────────────────
# Use the locally-built image defined in this add-on's Dockerfile.
build_from:
  aarch64: "debian:bullseye-slim"   # Raspberry Pi 4/5
  armv7: "debian:bullseye-slim"     # Older Pi (32-bit)
  amd64: "debian:bullseye-slim"     # x86-64 (dev/testing)

# ── Networking ────────────────────────────────────────────────────────────────
ports:
  7860/tcp: 7860                    # Fusion addon HTTP port

ports_description:
  7860/tcp: "Fusion Dizipal API & Manifest"

# ── Startup options ───────────────────────────────────────────────────────────
init: false                         # We manage our own process; no s6-overlay
startup: "application"
boot: "auto"

# ── Resources ─────────────────────────────────────────────────────────────────
# Chromium is memory-hungry; give it breathing room.
# Adjust map_roles / privileged as needed for your Pi.
map:
  - data:rw                         # Persistent data (cache, logs)

# ── User-configurable options ─────────────────────────────────────────────────
options:
  base_url: "https://dizipal.im"    # Change when site rotates domain
  port: 7860
  cache_ttl_hours: 12               # Token/link cache lifetime
  headless: true
  timeout_ms: 30000                 # Page-load timeout

schema:
  base_url: str
  port: int(1024,65535)
  cache_ttl_hours: int(1,72)
  headless: bool
  timeout_ms: int(5000,60000)

# ── Capabilities ──────────────────────────────────────────────────────────────
# Chromium needs these even inside Docker on HAOS.
privileged:
  - SYS_ADMIN                       # Required for Chrome sandbox (or use --no-sandbox)

# ── Add-on panel (optional Ingress) ───────────────────────────────────────────
panel_icon: "mdi:play-circle-outline"
panel_title: "Fusion Dizipal"

# ── Arch support ──────────────────────────────────────────────────────────────
arch:
  - aarch64
  - armv7
  - amd64
